services:
  postgres:
    image: postgres:16-alpine
    container_name: clm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: clm_dev
      POSTGRES_USER: clm_user
      POSTGRES_PASSWORD: clm_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clm_user -d clm_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
